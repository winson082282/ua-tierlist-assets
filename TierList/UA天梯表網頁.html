<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Union Arena 牌組天梯表</title>
</head>
<body>

  <div class="tier-list-container">
    <div class="filter-section">
      <div style="margin-bottom: 15px;">
        <label for="color-checkboxes" style="display: block; margin-bottom: 8px; font-weight: 600;">顏色篩選：</label>
        <div id="color-checkboxes" class="color-filter-group">
          <label class="color-option">
            <input type="checkbox" value="黃" id="color_cb_黃">
            <span>黃🟡</span>
          </label>
          <label class="color-option">
            <input type="checkbox" value="紫" id="color_cb_紫">
            <span>紫🟣</span>
          </label>
          <label class="color-option">
            <input type="checkbox" value="藍" id="color_cb_藍">
            <span>藍🔵</span>
          </label>
          <label class="color-option">
            <input type="checkbox" value="綠" id="color_cb_綠">
            <span>綠🟢</span>
          </label>
          <label class="color-option">
            <input type="checkbox" value="紅" id="color_cb_紅">
            <span>紅🔴</span>
          </label>
            <button type="button" id="clear-color-filter" class="clear-filter-btn">清除選取</button>
          
        </div>
      </div>
      <div style="margin-bottom: 15px;">
        <label for="series-filter" style="display: block; margin-bottom: 8px; font-weight: 600;">系列篩選：</label>
        <select id="series-filter" multiple="multiple" style="width: 100%;"></select>
      </div>
      <div>
        <button type="button" id="export-image-btn" class="export-btn">📸 匯出圖片</button>
      </div>
    </div>

    <div id="card-loading" style="text-align:center; padding: 20px;">⏳ 資料載入中...</div>
    <div id="tier-rows-container" class="tier-rows"></div>
  </div>

<!--引入 jQuery 與 Select2 的 JS-->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />
<!--引入 html2canvas，用於將天梯表匯出成圖片-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    // Google Sheet CSV 網址
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTjV26EfSqCY1ztrkCsPVfj3DkKW9Yz_rlYNsjumSrm72yyZGL6eTc-ETFFymI1s-nthf_FVi2OhP2v/pub?gid=218268368&single=true&output=csv';
    // 選項分頁
    const FILTER_OPTIONS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTjV26EfSqCY1ztrkCsPVfj3DkKW9Yz_rlYNsjumSrm72yyZGL6eTc-ETFFymI1s-nthf_FVi2OhP2v/pub?gid=2069717497&single=true&output=csv';
    
    // 顏色映射
    const colorMap = {
        '紅': 'ua-red',
        '紫': 'ua-purple',
        '藍': 'ua-blue',
        '綠': 'ua-green',
        '黃': 'ua-yellow'
    };

    // 顏色排序順序（分數段內排序用）：黃→紫→藍→綠→紅
    const colorOrder = {
        '黃': 0,
        '紫': 1,
        '藍': 2,
        '綠': 3,
        '紅': 4
    };
    
    // 預設圖片（全域常數）
    const defaultImg = 'https://placehold.co/100x100';
    
    let allCards = []; // 儲存所有牌組資料
    let activeTag = ''; // 當前選中的 標籤 按鈕

    // 依目前選取的系列，計算實際存在的顏色集合；未選系列則回傳 null 代表全部可用
    function getAvailableColors(selectedSeries) {
        if (!selectedSeries || selectedSeries.length === 0) return null;
        const matched = allCards.filter(c => selectedSeries.includes(c.series));
        return new Set(matched.map(c => c.color));
    }

    // 依可用顏色集合，停用/恢復顏色 checkbox；已勾選但變不可用時自動取消勾選
    function updateColorAvailability(selectedSeries) {
        const availableColors = getAvailableColors(selectedSeries);
        document.querySelectorAll('#color-checkboxes input[type="checkbox"]').forEach(cb => {
            const isAvailable = !availableColors || availableColors.has(cb.value);
            if (!isAvailable) {
                cb.checked = false;
                cb.disabled = true;
            } else {
                cb.disabled = false;
            }
        });
    }

    $(document).ready(function () {
        $('#series-filter').select2({
            placeholder: "請選擇系列...",
            allowClear: true,
            minimumResultsForSearch: Infinity,
            closeOnSelect: false
        });

        // 「清除選取」按鈕：只取消顏色 checkbox 勾選，不影響系列篩選與 tag 選取
        const clearColorBtn = document.getElementById('clear-color-filter');
        if (clearColorBtn) {
            clearColorBtn.addEventListener('click', function () {
                document.querySelectorAll('#color-checkboxes input[type="checkbox"]').forEach(cb => cb.checked = false);
                const selectedSeries = $('#series-filter').val();
                updateColorAvailability(selectedSeries);
                filterCards(selectedSeries, []);
            });
        }

        // 「匯出圖片」按鈕：將目前畫面的天梯表（含篩選結果）匯出成 PNG 圖片
        const exportImageBtn = document.getElementById('export-image-btn');
        if (exportImageBtn) {
            exportImageBtn.addEventListener('click', exportTierListImage);
        }

        // 同時載入選項與卡片資料
        Promise.all([
            loadSeriesFilterOptions(),
            loadCardsFromSheet()
        ])
        .then(function () {
            // 統一的篩選觸發函式：分類篩選與顏色篩選共用
            function triggerFilter() {
              const selectedSeries = $('#series-filter').val();
              updateColorAvailability(selectedSeries);
              const selectedColors = Array.from(document.querySelectorAll('#color-checkboxes input[type="checkbox"]:checked')).map(i => i.value);
              filterCards(selectedSeries, selectedColors);
            }

            // 初次載入時，依當下系列選取狀態同步一次顏色可用性
            updateColorAvailability($('#series-filter').val());

            $('#series-filter').on('change', triggerFilter);
            // 監聽 checkbox 容器的變更（事件代理）
            const colorContainer = document.getElementById('color-checkboxes');
            if (colorContainer) colorContainer.addEventListener('change', triggerFilter);
        })
        .catch(function (err) {
            $('#card-loading').html('❌ 資料載入失敗，請重新整理頁面。');
            console.error('Google Sheet 讀取錯誤：', err);
        });
    });

    // ★ 從選項分頁動態載入 <option>
    async function loadSeriesFilterOptions() {
        const response = await fetch(FILTER_OPTIONS_URL);
        if (!response.ok) throw new Error('HTTP ' + response.status);

        const csvText = await response.text();
        const lines = csvText.trim().split('\n');
        const select = document.getElementById('series-filter');
        const groupMap = {};

        for (let i = 1; i < lines.length; i++) {
            const fields = parseCSVLine(lines[i].trim());  // ← 更新呼叫名稱
            if (!fields || fields.length < 2) continue;

            const value = fields[0].trim();
            const label = fields[1].trim();
            const group = fields[2] ? fields[2].trim() : '';
            const count = fields[3] ? fields[3].trim() : '';
            if (!value || !label) continue;

            const option = document.createElement('option');
            option.value = value;
            option.textContent = label + ' (數量:' + count + ')';

            if (group) {
                // 若該 group 的 optgroup 還沒建立，先建立它
                if (!groupMap[group]) {
                    const optgroup = document.createElement('optgroup');
                    optgroup.label = group;
                    select.appendChild(optgroup);
                    groupMap[group] = optgroup;
                }
                groupMap[group].appendChild(option);
            } else {
                select.appendChild(option); // 沒有 group 就直接塞
            }
        }

        $('#series-filter').trigger('change.select2');
    }



    // --- 從 Google Sheet 讀取並渲染 ---
    async function loadCardsFromSheet() {
        const response = await fetch(SHEET_CSV_URL);
        if (!response.ok) throw new Error('HTTP ' + response.status);

        const csvText = await response.text();
        allCards = parseDeckCSV(csvText);
        renderCards(allCards);

        document.getElementById('card-loading').style.display = 'none';
    }

    // --- 解析牌組 CSV（支援含逗號的欄位，有引號包覆的情況）---
    function parseDeckCSV(csvText) {  // ← parseCSV 改為 parseDeckCSV
        const lines = csvText.trim().split('\n');
        const cards = [];

        for (let i = 1; i < lines.length; i++) {
            const fields = parseCSVLine(lines[i].trim());  // ← 更新呼叫名稱
            if (!fields || fields.length < 3) continue;

            const imgurl = 'https://res.cloudinary.com/c9t2zuha/image/upload/';
            const score       = parseInt(fields[0]);
            const series      = fields[1] ? fields[1].trim() : '';
            const releaseDate = fields[2] ? fields[2].trim() : '';
            const tag         = fields[3] ? fields[3].trim() : '';
            const color       = fields[4] ? fields[4].trim() : '';
            const iconName    = fields[5] ? fields[5].trim() : '';
            const href        = fields[6] ? fields[6].trim() : null;
            const src         = iconName ? imgurl + iconName : defaultImg;

            if (!isNaN(score) && src) {
                cards.push({ score, tag, color, series, src, href: href || null, releaseDate });
            }
        }
        return cards;
    }

    // --- 解析出售日期字串為 Date 物件（空白回傳 null） ---
    function parseReleaseDate(str) {
        if (!str) return null;
        const d = new Date(str);
        return isNaN(d.getTime()) ? null : d;
    }

    // --- 分數段內排序：1. 顏色（黃→紫→藍→綠→紅） 2. 出售日期倒序（新到舊，空白排最前） ---
    function compareCardsForSort(a, b) {
        const colorDiff = (colorOrder[a.color] ?? 999) - (colorOrder[b.color] ?? 999);
        if (colorDiff !== 0) return colorDiff;

        const aDate = parseReleaseDate(a.releaseDate);
        const bDate = parseReleaseDate(b.releaseDate);
        if (!aDate && !bDate) return 0;
        if (!aDate) return -1;
        if (!bDate) return 1;
        return bDate - aDate;
    }

    // --- CSV 單行欄位解析（正確處理引號） ---
    function parseCSVLine(line) {
        const fields = [];
        let current = '';
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"') {
                if (inQuotes && line[i + 1] === '"') {
                    current += '"'; i++; // 跳脫的 ""
                } else {
                    inQuotes = !inQuotes;
                }
            } else if (ch === ',' && !inQuotes) {
                fields.push(current); current = '';
            } else {
                current += ch;
            }
        }
        fields.push(current);
        return fields;
    }

    // --- 動態產生天梯表 HTML ---
    function renderCards(cards) {
        const scores = [...new Set(cards.map(c => c.score))].sort((a, b) => b - a);
        const container = document.getElementById('tier-rows-container');
        let html = '';

        scores.forEach(score => {
            html += `<div class="tier-row rank-${score}">`;
            html += `  <div class="tier-label">${score}分</div>`;
            html += `  <div class="tier-content">`;

            cards.filter(c => c.score === score).sort(compareCardsForSort).forEach(card => {
                const colorClass = colorMap[card.color] || '';
                const isActive = !activeTag || card.tag === activeTag;
                
                const img = `<img
                    data-tag="${card.tag}"
                    data-color="${card.color}"
                    data-series="${card.series}"
                    border="0" src="${card.src}"
                    crossorigin="anonymous"
                    onerror="this.onerror=null; this.src='${defaultImg}';" />`;
                
                const inner = card.href
                    ? `<a href="${card.href}" target="_blank" rel="noopener noreferrer">${img}</a>`
                    : img;
                const linkBadge = card.href ? `<span class="link-badge">🔗</span>` : '';
                
                const activeClass = isActive ? 'is-active' : 'is-dimmed';
                html += `<div class="deck-card-wrapper">`;
                html += `  <div class="deck-card ${colorClass} ${activeClass}">`;
                html += `    ${inner}`;
                html += `    ${linkBadge}`;
                html += `  </div>`;
                
                if (card.tag) {
                    html += `  <button type="button" class="tag-chip" onclick="toggleTag('${card.tag}')">${card.tag}</button>`;
                }
                
                html += `</div>`;
            });

            html += `  </div>`;
            html += `</div>`;
        });

        container.innerHTML = html;
    }

    // --- 篩選邏輯（支援 Select2 系列篩選 + 標籤按鈕過濾） ---
    function filterCards(selectedSeries, selectedColors) {
        const hasSeries = selectedSeries && selectedSeries.length > 0;
        const hasColor  = selectedColors && selectedColors.length > 0;

        // 遍歷所有卡片 wrapper，先重置 display
        document.querySelectorAll('.deck-card-wrapper').forEach(wrapper => {
            const cardEl = wrapper.querySelector('.deck-card');
            const btnEl = wrapper.querySelector('.tag-chip');
            const img = cardEl.querySelector('img');
            if (!img) return;

            const tag = img.dataset.tag || '';
            const color = img.dataset.color || '';
            const series = img.dataset.series || '';

            // Select2 篩選條件
            const seriesMatch = !hasSeries || selectedSeries.includes(series);
            const colorMatch  = !hasColor  || selectedColors.includes(color);
            const select2Pass = seriesMatch && colorMatch;

            // Tag 按鈕篩選條件
            const buttonPass = !activeTag || tag === activeTag;

            // 根據 Select2 過濾條件決定 wrapper 是否顯示
            if (!select2Pass) {
                // Select2 過濾掉了，隱藏整個 wrapper（卡片 + 按鈕）
                wrapper.style.display = 'none';
                cardEl.classList.remove('is-active', 'is-dimmed');
                if (btnEl) btnEl.classList.remove('is-dimmed');
            } else {
                // Select2 通過，顯示 wrapper
                wrapper.style.display = '';
                
                // 再根據按鈕過濾應用樣式
                if (buttonPass) {
                    cardEl.classList.remove('is-dimmed');
                    cardEl.classList.add('is-active');
                    if (btnEl) btnEl.classList.remove('is-dimmed');
                } else {
                    cardEl.classList.remove('is-active');
                    cardEl.classList.add('is-dimmed');
                    if (btnEl) btnEl.classList.add('is-dimmed');
                }
            }
        });

        // 隱藏空的級距行
        document.querySelectorAll('.tier-row').forEach(row => {
            const visibleWrappers = row.querySelectorAll('.deck-card-wrapper:not([style*="display: none"])').length;
            row.style.display = visibleWrappers > 0 ? '' : 'none';
        });
    }

    // --- Tag 按鈕點擊處理 ---
    function toggleTag(tag) {
        activeTag = activeTag === tag ? '' : tag;
        const selectedSeries = $('#series-filter').val();
      const selectedColors = Array.from(document.querySelectorAll('#color-checkboxes input[type="checkbox"]:checked')).map(i => i.value);
        filterCards(selectedSeries, selectedColors);
    }

    // --- 匯出目前畫面的天梯表為 PNG 圖片 ---
    function exportTierListImage() {
        const target = document.getElementById('tier-rows-container');
        const btn = document.getElementById('export-image-btn');
        if (!target || !btn) return;

        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = '匯出中...';

        html2canvas(target, {
            useCORS: true,
            backgroundColor: '#faf6f0',
            scale: 2
        }).then(function (canvas) {
            const link = document.createElement('a');
            const pad = n => String(n).padStart(2, '0');
            const now = new Date();
            const timestamp = now.getFullYear() + pad(now.getMonth() + 1) + pad(now.getDate()) + '_' + pad(now.getHours()) + pad(now.getMinutes());
            link.download = `UA天梯表_${timestamp}.png`;
            link.href = canvas.toDataURL('image/png');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }).catch(function (err) {
            console.error('匯出圖片失敗：', err);
            alert('匯出圖片失敗，請稍後再試。');
        }).finally(function () {
            btn.disabled = false;
            btn.textContent = originalText;
        });
    }
</script>

<style>
/* ★ 淡雅奶油主題 - 基礎設定 */
body {
  background: linear-gradient(135deg, #faf6f0 0%, #fdfbf7 100%);
  font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  color: #6b5844;
  margin: 0;
  padding: 20px;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

.tier-list-container {
  width: 100%;
  max-width: 1400px;
}

/* 標題區 */
.tier-list-header {
  text-align: center;
  margin-bottom: 20px;
}

.tier-list-header h1 {
  font-size: 2.2rem;
  font-weight: 700;
  background: linear-gradient(45deg, #c17a6a, #d4a574);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 5px;
}

.tier-list-header p {
  color: #7d6b5c;
  font-size: 0.95rem;
  margin: 0;
}

/* 篩選區域 */
.filter-section {
  background: rgba(255, 255, 255, 0.65);
  border: 1px solid rgba(93, 74, 56, 0.15);
  border-radius: 14px;
  padding: 22px 24px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
}

.filter-section label {
  color: #6b5844;
  font-size: 1.08rem;
}

/* Select2 自定義樣式 */
.select2-container--default .select2-selection--multiple {
  background: rgba(255, 255, 255, 0.7);
  border: 1px solid rgba(93, 74, 56, 0.2) !important;
  border-radius: 8px;
  min-height: 46px;
  font-size: 1rem;
}

.select2-container--default.select2-container--focus .select2-selection--multiple {
  border-color: #d4a574 !important;
}

.select2-container--default .select2-selection--multiple .select2-selection__rendered {
  padding: 6px 10px;
  gap: 6px;
}

.select2-container--default .select2-selection--multiple .select2-selection__choice {
  background: linear-gradient(135deg, #d4a574 0%, #c8956e 100%);
  border-color: #c17a6a;
  color: #fff;
  font-size: 0.95rem;
  padding: 4px 10px;
}

/* 每個已選標籤上的移除按鈕 (x)：放大並加強點擊回饋 */
.select2-container--default .select2-selection--multiple .select2-selection__choice__remove {
  color: rgba(255, 255, 255, 0.85);
  font-size: 1.15rem;
  font-weight: 700;
  margin-right: 6px;
  padding: 0 4px;
  border-right: none;
  border-radius: 4px;
  transition: background 0.15s ease, color 0.15s ease;
}

.select2-container--default .select2-selection--multiple .select2-selection__choice__remove:hover {
  background: rgba(255, 255, 255, 0.3);
  color: #fff;
}

/* 全部清除按鈕 (allowClear 產生的 x)：放大成圓形按鈕並加上 hover 回饋 */
.select2-container--default .select2-selection--multiple .select2-selection__clear {
  font-size: 1.4rem;
  font-weight: 700;
  color: #c17a6a;
  width: 26px;
  height: 26px;
  line-height: 24px;
  text-align: center;
  margin: 8px 8px 0 0;
  border-radius: 50%;
  transition: background 0.15s ease, color 0.15s ease;
}

.select2-container--default .select2-selection--multiple .select2-selection__clear:hover {
  background: rgba(193, 122, 106, 0.18);
  color: #a85f4f;
}

.select2-container--default .select2-search--inline .select2-search__field {
  font-size: 1rem;
}

.select2-dropdown {
  font-size: 1rem;
}

.select2-container--default .select2-results__option {
  padding: 8px 12px;
}

/* 下拉選單多欄位排版：選項數量多時用欄位取代單純上下捲動 */
.select2-container--default .select2-results > .select2-results__options {
  display: flex;
  flex-direction: column;
  flex-wrap: wrap;
  align-content: flex-start;
  max-height: min(600px, 70vh);
  overflow-x: auto;
  overflow-y: auto;
}

.select2-container--default .select2-results > .select2-results__options > .select2-results__option {
  width: 260px;
  box-sizing: border-box;
  flex-shrink: 0;
}

.select2-container--default .select2-results__group {
  font-weight: 700;
  color: #6b5844;
  background: rgba(212, 165, 116, 0.15);
}

/* 下拉選單 hover/鍵盤選取的高亮色，改用主題焦糖色取代 Select2 預設藍色 */
.select2-container--default .select2-results__option--highlighted[aria-selected] {
  background-color: #d4a574;
  color: #fff;
}

/* 天梯表整體外框 */
.tier-rows {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 18px;
  background: rgba(255, 255, 255, 0.55);
  border: 1px solid rgba(255, 255, 255, 0.7);
  border-radius: 16px;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
}

/* 單一級距行 */
.tier-row {
  display: flex;
  background: rgba(255, 255, 255, 0.65);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
  transition: opacity 0.3s ease;
}

/* 左側分數標籤區 */
.tier-label {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 90px;
  min-width: 90px;
  font-size: 1.4rem;
  font-weight: bold;
  color: #fff;
  text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
  border-right: 1px solid rgba(255, 255, 255, 0.3);
}

.rank-10 .tier-label { background: linear-gradient(135deg, #d9756a, #c85a52); }
.rank-9 .tier-label  { background: linear-gradient(135deg, #dc8d6f, #d07960); }
.rank-8 .tier-label  { background: linear-gradient(135deg, #dfa876, #d99462); }
.rank-7 .tier-label  { background: linear-gradient(135deg, #dfc084, #d9ac70); }
.rank-6 .tier-label  { background: linear-gradient(135deg, #d9c87c, #d3b468); }
.rank-5 .tier-label  { background: linear-gradient(135deg, #cad085, #bec470); }
.rank-4 .tier-label  { background: linear-gradient(135deg, #b8d896, #acd282); }
.rank-3 .tier-label  { background: linear-gradient(135deg, #a5dea8, #99d295); }
.rank-2 .tier-label  { background: linear-gradient(135deg, #98d9b8, #8ccda8); }
.rank-1 .tier-label  { background: linear-gradient(135deg, #a8b8a8, #9cac9c); }
.rank-0 .tier-label  { background: linear-gradient(135deg, #8f8f8f, #6f6f6f); }

.tier-content {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
  gap: 10px;
  padding: 15px;
  flex-grow: 1;
}

.deck-card-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.deck-card {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  background-color: #fff;
  border: 2px solid rgba(93, 74, 56, 0.15);
  border-radius: 10px;
  overflow: hidden;
  cursor: default;
  transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease, filter 0.2s ease;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
}

.deck-card > img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.deck-card > a {
  width: 100%;
  height: 100%;
  display: flex;
  cursor: pointer;
}

.deck-card > a > img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.link-badge {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.55);
  font-size: 0.65rem;
  line-height: 1;
  color: #fff;
  pointer-events: none;
  z-index: 2;
}

.deck-card.is-dimmed {
  opacity: 0.3;
  filter: grayscale(0.8) brightness(0.85);
}

.deck-card.is-active {
  border-width: 3px;
  box-shadow: 0 4px 12px rgba(193, 122, 106, 0.3);
}

.deck-name {
  padding: 3px 0;
  background: rgba(93, 74, 56, 0.92);
  color: #fff;
  font-size: 0.7rem;
  font-weight: normal;
  text-align: center;
  text-overflow: ellipsis;
  white-space: nowrap;
  overflow: hidden;
  position: static;
  opacity: 1;
  transition: opacity 0.2s;
  display: none;
}

.tag-chip {
      width: 100%;
      max-width: 70px;
      padding: 4px 8px;
      background: rgba(212, 165, 116, 0.95);
      border: 1px solid rgba(93, 74, 56, 0.3);
      border-radius: 6px;
      color: #fff;
      font-size: 0.62rem;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      box-sizing: border-box;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
      transition: background 0.2s ease, opacity 0.2s ease, filter 0.2s ease;
    }

    .tag-chip:hover {
      background: rgba(193, 122, 106, 0.95);
    }

    .tag-chip.is-dimmed {
  opacity: 0.3;
  filter: grayscale(0.8) brightness(0.85);
}

/* 色彩變體 */
.ua-red { border-color: #e85d52; box-shadow: 0 0 8px rgba(232, 93, 82, 0.4); }
.ua-green { border-color: #5fc96e; box-shadow: 0 0 8px rgba(95, 201, 110, 0.4); }
.ua-yellow { border-color: #f0b850; box-shadow: 0 0 8px rgba(240, 184, 80, 0.4); }
.ua-blue { border-color: #6b8fd9; box-shadow: 0 0 8px rgba(107, 143, 217, 0.4); }
.ua-purple { border-color: #c084d9; box-shadow: 0 0 8px rgba(192, 132, 217, 0.4); }

.ua-red:hover { box-shadow: 0 0 16px rgba(232, 93, 82, 0.7); }
.ua-green:hover { box-shadow: 0 0 16px rgba(95, 201, 110, 0.7); }
.ua-yellow:hover { box-shadow: 0 0 16px rgba(240, 184, 80, 0.7); }
.ua-blue:hover { box-shadow: 0 0 16px rgba(107, 143, 217, 0.7); }
.ua-purple:hover { box-shadow: 0 0 16px rgba(192, 132, 217, 0.7); }

/* 顏色篩選區塊樣式 */
.color-filter-group {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: nowrap;
  overflow-x: auto;
}

.clear-filter-btn {
  flex-shrink: 0;
  padding: 10px 16px;
  background: transparent;
  border: 1px solid rgba(193, 122, 106, 0.5);
  border-radius: 999px;
  color: #c17a6a;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s ease, color 0.2s ease;
}

.clear-filter-btn:hover {
  background: #c17a6a;
  color: #fff;
}

/* 匯出圖片按鈕 */
.export-btn {
  padding: 10px 18px;
  background: linear-gradient(135deg, #d4a574 0%, #c8956e 100%);
  border: 1px solid rgba(93, 74, 56, 0.3);
  border-radius: 999px;
  color: #fff;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
  transition: background 0.2s ease, opacity 0.2s ease, transform 0.15s ease;
}

.export-btn:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
}

.export-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

/* 顏色 chip 按鈕：checkbox 視覺隱藏，label 本身即為可點擊的色塊按鈕 */
.color-option {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 10px 20px;
  border-radius: 999px;
  border: 2px solid transparent;
  cursor: pointer;
  flex-shrink: 0;
  font-size: 1.05rem;
  font-weight: 700;
  white-space: nowrap;
  transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
}

.color-option:hover {
  transform: translateY(-1px);
}

.color-option input[type="checkbox"] {
  position: absolute;
  width: 1px;
  height: 1px;
  margin: -1px;
  padding: 0;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.color-option span {
  pointer-events: none;
}

/* 各顏色未選中：淺色描邊風格 */
.color-option:has(input[value="黃"]) { border-color: rgba(240, 184, 80, 0.6); background: rgba(240, 184, 80, 0.14); color: #a3781f; }
.color-option:has(input[value="紫"]) { border-color: rgba(192, 132, 217, 0.6); background: rgba(192, 132, 217, 0.14); color: #7d4a94; }
.color-option:has(input[value="藍"]) { border-color: rgba(107, 143, 217, 0.6); background: rgba(107, 143, 217, 0.14); color: #3f5c9e; }
.color-option:has(input[value="綠"]) { border-color: rgba(95, 201, 110, 0.6); background: rgba(95, 201, 110, 0.14); color: #2f7d3d; }
.color-option:has(input[value="紅"]) { border-color: rgba(232, 93, 82, 0.6); background: rgba(232, 93, 82, 0.14); color: #b03d33; }

/* 各顏色已選中：實色填滿 */
.color-option:has(input[value="黃"]:checked) { background: linear-gradient(135deg, #f0b850, #d9a03e); color: #fff; box-shadow: 0 3px 10px rgba(240, 184, 80, 0.45); }
.color-option:has(input[value="紫"]:checked) { background: linear-gradient(135deg, #c084d9, #a868c4); color: #fff; box-shadow: 0 3px 10px rgba(192, 132, 217, 0.45); }
.color-option:has(input[value="藍"]:checked) { background: linear-gradient(135deg, #6b8fd9, #5573c0); color: #fff; box-shadow: 0 3px 10px rgba(107, 143, 217, 0.45); }
.color-option:has(input[value="綠"]:checked) { background: linear-gradient(135deg, #5fc96e, #45ab54); color: #fff; box-shadow: 0 3px 10px rgba(95, 201, 110, 0.45); }
.color-option:has(input[value="紅"]:checked) { background: linear-gradient(135deg, #e85d52, #cf4438); color: #fff; box-shadow: 0 3px 10px rgba(232, 93, 82, 0.45); }

/* 目前系列篩選下不存在的顏色：灰階顯示且不可點擊 */
.color-option:has(input:disabled) {
  opacity: 0.35;
  filter: grayscale(0.6);
  cursor: not-allowed;
  pointer-events: none;
}

@media (max-width: 600px) {
  .tier-row {
    flex-direction: column;
  }
  
  .tier-label {
    width: 100%;
    height: 35px;
    min-height: 35px;
    font-size: 1.1rem;
    border-right: none;
    border-bottom: 1px solid rgba(255, 255, 255, 0.3);
  }
  
  .tier-content {
    grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
    gap: 6px;
    padding: 10px;
  }

  .filter-section {
    padding: 16px;
  }

  .color-filter-group {
    flex-wrap: wrap;
    overflow-x: visible;
  }

  .color-option {
    padding: 8px 14px;
    font-size: 0.95rem;
  }

  .select2-container--default .select2-results > .select2-results__options {
    flex-direction: column;
    flex-wrap: nowrap;
    max-height: 300px;
    overflow-x: hidden;
    overflow-y: auto;
  }

  .select2-container--default .select2-results > .select2-results__options > .select2-results__option {
    width: 100%;
  }
}
</style>
