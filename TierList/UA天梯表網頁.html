<div class="tier-list-container">
  <div class="filter-section">
    <div class="filter-row">
      <div class="filter-item series-filter-item">
        <label for="series-filter" class="filter-title">系列篩選：</label>
        <div id="series-filter"></div>
      </div>
      <div class="filter-item color-filter-item">
        <label for="color-checkboxes" class="filter-title">顏色篩選：</label>
        <div id="color-checkboxes" class="color-filter-group">
          <label class="color-option">
            <input type="checkbox" value="黃" id="color_cb_黃">
            <span>黃🟡</span>
          </label>
          <label class="color-option">
            <input type="checkbox" value="紫" id="color_cb_紫">
            <span>紫🟣</span>
          </label>
          <label class="color-option">
            <input type="checkbox" value="藍" id="color_cb_藍">
            <span>藍🔵</span>
          </label>
          <label class="color-option">
            <input type="checkbox" value="綠" id="color_cb_綠">
            <span>綠🟢</span>
          </label>
          <label class="color-option">
            <input type="checkbox" value="紅" id="color_cb_紅">
            <span>紅🔴</span>
          </label>
          <button type="button" id="clear-color-filter" class="clear-filter-btn">清除顏色選取</button>
        </div>
      </div>
    </div>
    <div>
      <button type="button" id="export-image-btn" class="export-btn">📸 匯出圖片</button>
    </div>
  </div>

  <div id="card-loading" style="text-align:center; padding: 20px;">⏳ 資料載入中...</div>
  <div id="tier-rows-container" class="tier-rows"></div>
</div>

<!--引入 jQuery 與 Virtual Select 的 JS-->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/virtual-select-plugin@1.0.45/dist/virtual-select.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/virtual-select-plugin@1.0.45/dist/virtual-select.min.css" rel="stylesheet" />

<!--引入 html2canvas，用於將天梯表匯出成圖片-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- 主要程式碼：本機走 local，非本機（含 Blogger）自動走 GitHub CDN -->
<script>
  (function () {
    var host = (window.location.hostname || "").toLowerCase();
    var protocol = window.location.protocol;
    var isLocal = protocol === "file:" ||
      host === "localhost" ||
      host === "127.0.0.1" ||
      host === "::1" ||
      host.indexOf("192.168.") === 0 ||
      host.indexOf("10.") === 0;

    var basePath = isLocal
      ? "./"
      : "https://cdn.jsdelivr.net/gh/winson082282/ua-tierlist-assets@main/TierList/";

    if (!document.querySelector('link[data-ua-tierlist-style="1"]')) {
      var style = document.createElement("link");
      style.rel = "stylesheet";
      style.href = basePath + "style.css";
      style.setAttribute("data-ua-tierlist-style", "1");
      document.head.appendChild(style);
    }

    if (!document.querySelector('script[data-ua-tierlist-main="1"]')) {
      var mainScript = document.createElement("script");
      mainScript.src = basePath + "main.js";
      mainScript.setAttribute("data-ua-tierlist-main", "1");
      document.body.appendChild(mainScript);
    }
  })();
</script>
