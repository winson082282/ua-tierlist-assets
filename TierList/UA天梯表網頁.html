<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<div style="margin-bottom: 15px; text-align: center;">
    <select id="card-filter" multiple="multiple" style="width: 400px;"></select>
    <select id="color-filter" multiple="multiple" style="width: 400px;">
        <option value="黃">黃🟡</option>
        <option value="紫">紫🟣</option>
        <option value="藍">藍🔵</option>
        <option value="綠">綠🟢</option>
        <option value="紅">紅🔴</option>
    </select>
</div>

<div id="card-loading" style="text-align:center; padding: 20px;">⏳ 資料載入中...</div>
<div id="card-display"></div>

<!--引入 jQuery 與 Select2 的 JS-->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />

<script>
    // Google Sheet CSV 網址
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTjV26EfSqCY1ztrkCsPVfj3DkKW9Yz_rlYNsjumSrm72yyZGL6eTc-ETFFymI1s-nthf_FVi2OhP2v/pub?gid=0&single=true&output=csv';
    // 選項分頁
    const FILTER_OPTIONS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTjV26EfSqCY1ztrkCsPVfj3DkKW9Yz_rlYNsjumSrm72yyZGL6eTc-ETFFymI1s-nthf_FVi2OhP2v/pub?gid=1050221666&single=true&output=csv';

    $(document).ready(function () {
        const colorMap = { '黃': '#FFD700', '紫': '#9B59B6', '藍': '#3498DB', '綠': '#2ECC71', '紅': '#E74C3C' };
        const formatColor = option => option.id
            ? $('<span>').css('color', colorMap[option.id]).text(option.text)
            : option.text;

        $('#card-filter').select2({
            placeholder: "請選擇分類...",
            allowClear: true
        });

        $('#color-filter').select2({
            placeholder: "請選擇顏色...",
            allowClear: true,
            templateResult: formatColor,
            templateSelection: formatColor
        });

        // 同時載入選項與卡片資料
        Promise.all([
            loadFilterOptions(),
            loadCardsFromSheet()
        ])
        .then(function () {
            // 統一的篩選觸發函式：分類篩選與顏色篩選共用
            // 每次觸發都會同時讀取兩個下拉選單目前的值，
            // 這樣不管使用者先選哪一個、或兩個都選，篩選結果都會正確取交集
            function triggerFilter() {
                const selectedCategories = $('#card-filter').val();
                const selectedColors = $('#color-filter').val();
                filterCards(selectedCategories, selectedColors);
            }

            $('#card-filter').on('change', triggerFilter);
            $('#color-filter').on('change', triggerFilter);
        })
        .catch(function (err) {
            $('#card-loading').html('❌ 資料載入失敗，請重新整理頁面。');
            console.error('Google Sheet 讀取錯誤：', err);
        });
    });

    // ★ 從選項分頁動態載入 <option>
    async function loadFilterOptions() {
        const response = await fetch(FILTER_OPTIONS_URL);
        if (!response.ok) throw new Error('HTTP ' + response.status);

        const csvText = await response.text();
        const lines = csvText.trim().split('\n');
        const select = document.getElementById('card-filter');
        const groupMap = {};

        for (let i = 1; i < lines.length; i++) {
            const fields = parseCSVLine(lines[i].trim());  // ← 更新呼叫名稱
            if (!fields || fields.length < 2) continue;

            const value = fields[0].trim();
            const label = fields[1].trim();
            const group = fields[2] ? fields[2].trim() : '';
            const count = fields[3] ? fields[3].trim() : '';
            if (!value || !label) continue;

            const option = document.createElement('option');
            option.value = value;
            option.textContent = label + ' (數量:' + count + ')';

            if (group) {
                // 若該 group 的 optgroup 還沒建立，先建立它
                if (!groupMap[group]) {
                    const optgroup = document.createElement('optgroup');
                    optgroup.label = group;
                    select.appendChild(optgroup);
                    groupMap[group] = optgroup;
                }
                groupMap[group].appendChild(option);
            } else {
                select.appendChild(option); // 沒有 group 就直接塞
            }
        }

        $('#card-filter').trigger('change.select2');
    }

    // --- 從 Google Sheet 讀取並渲染 ---
    async function loadCardsFromSheet() {
        const response = await fetch(SHEET_CSV_URL);
        if (!response.ok) throw new Error('HTTP ' + response.status);

        const csvText = await response.text();
        const cards = parseDeckCSV(csvText);  // ← 更新呼叫名稱
        renderCards(cards);

        document.getElementById('card-loading').style.display = 'none';
    }

    // --- 解析牌組 CSV（支援含逗號的欄位，有引號包覆的情況）---
    function parseDeckCSV(csvText) {  // ← parseCSV 改為 parseDeckCSV
        const lines = csvText.trim().split('\n');
        const cards = [];

        for (let i = 1; i < lines.length; i++) {
            const fields = parseCSVLine(lines[i].trim());  // ← 更新呼叫名稱
            if (!fields || fields.length < 3) continue;

            const imgurl = 'https://cdn.jsdelivr.net/gh/winson082282/ua-tierlist-assets/TierList_DeckIcon/';
            const score = parseInt(fields[0]);
            const category = fields[1] ? fields[1].trim() : '';
            const series   = fields[2] ? fields[2].trim() : '';
            const color    = fields[3] ? fields[3].trim() : '';
            const iconName = fields[4] ? fields[4].trim() : '';
            const href     = fields[5] ? fields[5].trim() : null;
            const cardName = fields[6] ? fields[6].trim() : '';
            const src      = iconName ? imgurl + iconName + '.jpg' : defaultImg;

            if (!isNaN(score) && src) {
                cards.push({ score, category, color, series, cardName, src, href: href || null });
            }
        }
        return cards;
    }

    // --- CSV 單行欄位解析（正確處理引號） ---
    function parseCSVLine(line) {
        const fields = [];
        let current = '';
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"') {
                if (inQuotes && line[i + 1] === '"') {
                    current += '"'; i++; // 跳脫的 ""
                } else {
                    inQuotes = !inQuotes;
                }
            } else if (ch === ',' && !inQuotes) {
                fields.push(current); current = '';
            } else {
                current += ch;
            }
        }
        fields.push(current);
        return fields;
    }

    // --- 動態產生卡片 HTML ---
    function renderCards(cards) {
        const scores = [...new Set(cards.map(c => c.score))].sort((a, b) => b - a);
        const container = document.getElementById('card-display');
        const defaultImg = 'https://placehold.co/100x100';
        let html = '';

        scores.forEach(score => {
            const pad = String(score).padStart(2, '0');
            html += `<h2 class="score-${pad}">${score}分</h2>`;
            html += `<div class="card-grid-container">`;

            cards.filter(c => c.score === score).forEach(card => {
                const img = `<img
                    alt="${card.cardName || card.category}"
                    data-category="${card.category}"
                    data-color="${card.color}"
                    data-series="${card.series}"
                    border="0" width="100" src="${card.src}"
                    onerror="this.onerror=null; this.src='${defaultImg}';" />`;
                const inner = card.href
                    ? `<a href="${card.href}" target="_blank">${img}</a>`
                    : img;
                html += `<div class="card-grid-item">${inner}</div>`;
            });

            html += `</div>`;
        });

        container.innerHTML = html;
    }

    // --- 篩選邏輯 ---
    function filterCards(selectedCategories, selectedColors) {
        const hasCategory = selectedCategories && selectedCategories.length > 0;
        const hasColor    = selectedColors    && selectedColors.length    > 0;

        if (!hasCategory && !hasColor) {
            $('.card-grid-item').show();
            $('h2[class^="score-"]').show();
            return;
        }

        $('.card-grid-item').hide();

        $('.card-grid-item img').each(function () {
            const $img = $(this);
            const category = $img.data('category') || '';
            const color    = $img.data('color') || '';

            const categoryMatch = !hasCategory || selectedCategories.includes(category);
            const colorMatch    = !hasColor    || selectedColors.includes(color);

            if (categoryMatch && colorMatch) {
                $img.closest('.card-grid-item').show();
            }
        });

        $('h2[class^="score-"]').each(function () {
            const hasVisible = $(this).next('.card-grid-container').find('.card-grid-item:visible').length > 0;
            $(this).toggle(hasVisible);
        });
    }
</script>

<style>
    .card-grid-container {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        justify-content: left;
        width: 100%;
        margin-bottom: 25px;
        box-sizing: border-box;
    }

    .card-grid-item {
        width: 100px;
        padding: 0px;
        border: 0px;
        background-color: transparent;
        display: flex;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
    }

    .card-grid-item img {
        max-width: 100%;
        height: auto;
        display: block;
    }

    /* ★ 共用樣式收斂 */
    h2[class^="score-"] {
        color: #000000;
        font-weight: bold;
        padding: 10px 15px;
        margin-top: 10px;
        margin-bottom: 10px;
        border-radius: 4px;
        box-sizing: border-box;
        text-align: center;
    }

    /* ★ 各分數只保留背景色 */
    .score-10 { background-color: #ff6b6b; }
    .score-09 { background-color: #f39c11; }
    .score-08 { background-color: #f1c40f; }
    .score-07 { background-color: #9fe2bf; }
    .score-06 { background-color: #80e1ab; }
    .score-05 { background-color: #4ecdc4; }
    .score-04 { background-color: #fed700; }
    .score-03 { background-color: #fea500; }
    .score-02 { background-color: #fd79a8; }
    .score-01 { background-color: #e84c3d; }
    .score-00 { background-color: #c1392b; }
</style>
